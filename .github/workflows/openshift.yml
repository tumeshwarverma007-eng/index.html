<a href="#" class="btn">Shop Now</a>

</div>

</div>

<section>

<h2 style="text-align:center;margin-bottom:40px;">Best Sellers</h2>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=600&q=80">
