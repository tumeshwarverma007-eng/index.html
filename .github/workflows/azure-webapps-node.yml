}

.card img{
width:100%;
height:300px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin:15px 0;
}

.price{
color:#ff9800;
font-size:22px;
font-weight:bold;
}

button{
margin-top:15px;
padding:12px 25px;
background:#111;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}
</style>

</head>
<body>

